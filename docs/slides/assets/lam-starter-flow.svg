<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Codex LAM starter flow</title>
  <desc id="desc">A visual overview of the Codex LAM template flow from repository setup to planning, building, auditing, and shipping.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="1" stop-color="#1f2933"/>
    </linearGradient>
    <style>
      .label { font: 700 28px Arial, sans-serif; fill: #f5f7fa; }
      .small { font: 500 18px Arial, sans-serif; fill: #d8dee9; }
      .note { font: 500 16px Arial, sans-serif; fill: #a7b1c2; }
      .box { fill: #162334; stroke: #4fd1c5; stroke-width: 3; rx: 18; }
      .gate { fill: #2a1f3a; stroke: #c084fc; stroke-width: 3; rx: 18; }
      .ship { fill: #213622; stroke: #86efac; stroke-width: 3; rx: 18; }
      .arrow { stroke: #d8dee9; stroke-width: 5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d8dee9"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="60" y="70" class="label">Codex LAM as a starter kit</text>
  <text x="60" y="105" class="small">Template files, workflows, skills, gates, and reviewable docs move together.</text>
  <rect x="70" y="170" width="190" height="135" class="box"/>
  <text x="105" y="220" class="label">Template</text>
  <text x="100" y="255" class="small">AGENTS.md</text>
  <text x="100" y="282" class="note">docs/internal</text>
  <path d="M270 238 H345" class="arrow"/>
  <rect x="365" y="170" width="190" height="135" class="gate"/>
  <text x="415" y="220" class="label">Plan</text>
  <text x="397" y="255" class="small">requirements</text>
  <text x="410" y="282" class="note">design / tasks</text>
  <path d="M565 238 H640" class="arrow"/>
  <rect x="660" y="170" width="190" height="135" class="box"/>
  <text x="705" y="220" class="label">Build</text>
  <text x="708" y="255" class="small">TDD loop</text>
  <text x="696" y="282" class="note">focused tests</text>
  <path d="M860 238 H935" class="arrow"/>
  <rect x="955" y="170" width="190" height="135" class="ship"/>
  <text x="998" y="220" class="label">Ship</text>
  <text x="995" y="255" class="small">review gate</text>
  <text x="1000" y="282" class="note">commit / push</text>
  <rect x="220" y="365" width="760" height="75" fill="#0f1720" stroke="#64748b" stroke-width="2" rx="18"/>
  <text x="258" y="412" class="small">quick-load and quick-save keep the next session aligned after context changes.</text>
</svg>
